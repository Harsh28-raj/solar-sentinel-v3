<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="40%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="earthGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="60%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sunBlur">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g opacity="0.8">
    <circle cx="50" cy="30" r="1" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="120" cy="80" r="1.5" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="20" r="1" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="50" r="1" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="15" r="1.5" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="60" r="1" fill="white"><animate attributeName="opacity" values="1;0.5;1" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="25" r="1" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="70" r="1.5" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="40" r="1" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="180" r="1" fill="white"><animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="240" r="1.5" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="280" cy="200" r="1" fill="white"><animate attributeName="opacity" values="1;0.2;1" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="270" r="1" fill="white"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="220" r="1.5" fill="white"><animate attributeName="opacity" values="1;0.4;1" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="260" r="1" fill="white"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.0s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="190" r="1" fill="white"><animate attributeName="opacity" values="1;0.6;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="230" r="1.5" fill="white"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="130" r="1" fill="white"><animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="150" r="1" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Sun corona pulse -->
  <circle cx="160" cy="150" r="70" fill="none" stroke="#FFB300" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="70;90;70" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="150" r="55" fill="none" stroke="#FF8F00" stroke-width="1.5" opacity="0.4">
    <animate attributeName="r" values="55;75;55" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Sun glow bg -->
  <circle cx="160" cy="150" r="52" fill="url(#sunGlow)" filter="url(#sunBlur)" opacity="0.6"/>
  <!-- Sun body -->
  <circle cx="160" cy="150" r="38" fill="#FFB300" filter="url(#glow)"/>
  <circle cx="160" cy="150" r="35" fill="#FDD835"/>
  <circle cx="148" cy="140" r="22" fill="#FFF176" opacity="0.5"/>

  <!-- Sun label -->
  <text x="160" y="205" text-anchor="middle" fill="#FFB300" font-family="monospace" font-size="11" opacity="0.9">☀ NASA SOHO</text>

  <!-- Solar wind particles -->
  <g filter="url(#glow)">
    <circle cx="210" cy="140" r="2" fill="#FF6F00" opacity="0.8">
      <animate attributeName="cx" values="210;420;630" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="155" r="1.5" fill="#FFB300" opacity="0.7">
      <animate attributeName="cx" values="210;420;630" dur="4s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="145" r="2" fill="#FF8F00" opacity="0.9">
      <animate attributeName="cx" values="210;420;630" dur="4s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.5;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="160" r="1.5" fill="#FF6F00" opacity="0.6">
      <animate attributeName="cx" values="210;420;630" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="135" r="2.5" fill="#FFD600" opacity="0.8">
      <animate attributeName="cx" values="210;420;630" dur="4s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0" dur="4s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="150" r="1.5" fill="#FF8F00" opacity="0.7">
      <animate attributeName="cx" values="210;420;630" dur="4s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0" dur="4s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="165" r="2" fill="#FFB300" opacity="0.5">
      <animate attributeName="cx" values="210;420;630" dur="4s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0" dur="4s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- DSCOVR satellite (between Sun and Earth) -->
  <g>
    <rect x="375" y="143" width="10" height="8" rx="1" fill="#90A4AE"/>
    <rect x="358" y="145" width="16" height="4" rx="1" fill="#42A5F5" opacity="0.9"/>
    <rect x="371" y="145" width="16" height="4" rx="1" fill="#42A5F5" opacity="0.9"/>
    <text x="380" y="138" text-anchor="middle" fill="#90CAF9" font-family="monospace" font-size="8">DSCOVR</text>
    <!-- DSCOVR blink -->
    <circle cx="380" cy="147" r="2" fill="#00E5FF">
      <animate attributeName="opacity" values="1;0;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Earth orbit ring (subtle) -->
  <ellipse cx="620" cy="150" rx="48" ry="48" fill="none" stroke="#1565C0" stroke-width="0.5" opacity="0.2"/>

  <!-- Earth -->
  <circle cx="620" cy="150" r="32" fill="url(#earthGrad)" filter="url(#glow)"/>
  <!-- Earth continents (simple shapes) -->
  <ellipse cx="612" cy="142" rx="8" ry="12" fill="#2E7D32" opacity="0.7"/>
  <ellipse cx="628" cy="155" rx="6" ry="9" fill="#388E3C" opacity="0.6"/>
  <ellipse cx="618" cy="162" rx="5" ry="6" fill="#1B5E20" opacity="0.5"/>
  <!-- Earth atmosphere glow -->
  <circle cx="620" cy="150" r="34" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Earth label -->
  <text x="620" y="198" text-anchor="middle" fill="#4FC3F7" font-family="monospace" font-size="11" opacity="0.9">🌍 EARTH</text>

  <!-- MagStorm Shield pulse on Earth (red alert) -->
  <circle cx="620" cy="150" r="40" fill="none" stroke="#FF1744" stroke-width="2" opacity="0">
    <animate attributeName="r" values="34;50;34" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Title text -->
  <text x="400" y="95" text-anchor="middle" fill="#00E5FF" font-family="monospace" font-size="22" font-weight="bold" filter="url(#glow)">SOLAR SENTINEL v3.0</text>
  <text x="400" y="118" text-anchor="middle" fill="#90CAF9" font-family="monospace" font-size="11">Real-Time Space Weather Intelligence Platform</text>

  <!-- Bottom tagline -->
  <text x="400" y="265" text-anchor="middle" fill="#546E7A" font-family="monospace" font-size="10">NASA SOHO · NASA DSCOVR · NOAA GOES · FastAPI · React · Three.js</text>

  <!-- Decorative line -->
  <line x1="100" y1="230" x2="700" y2="230" stroke="#1565C0" stroke-width="0.5" opacity="0.4"/>
</svg>
